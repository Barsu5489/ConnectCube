{% extends "main/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h2>Login</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
    <p class="mt-4 text-center">
        Don't have an account?
        <a href="/login/" class="text-blue-600 hover:underline">Register here</a>
    </p>
</form>

{% endblock %}
